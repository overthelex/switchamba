<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" width="24" height="24">
  <!-- EN "A": leftmost, blue — represents English layout -->
  <text
    x="6" y="17"
    font-family="'DejaVu Sans','Liberation Sans',Arial,sans-serif"
    font-size="15" font-weight="900"
    text-anchor="middle"
    fill="#6AACF0"
    opacity="0.7">A</text>

  <!-- RU "Я": center, red — represents Russian layout -->
  <text
    x="12.5" y="15"
    font-family="'DejaVu Sans','Liberation Sans',Arial,sans-serif"
    font-size="15" font-weight="900"
    text-anchor="middle"
    fill="#F07070"
    opacity="0.85">Я</text>

  <!-- UA "І": rightmost, yellow — represents Ukrainian layout -->
  <text
    x="18.5" y="13"
    font-family="'DejaVu Sans','Liberation Sans',Arial,sans-serif"
    font-size="15" font-weight="900"
    text-anchor="middle"
    fill="#FFDA44"
    opacity="1">І</text>

  <!-- Keyboard bar: subtle bottom edge -->
  <rect x="3" y="20" width="18" height="1.5" rx="0.75"
    fill="white" opacity="0.25"/>
</svg>
